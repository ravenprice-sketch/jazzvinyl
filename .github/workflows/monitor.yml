name: Jazz Vinyl Monitor

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch: {}

permissions:
  contents: write          # needed to commit data.json / blurbs.json back

concurrency:
  group: vinyl-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # seen.json (the alert de-dupe state) lives in cache — it doesn't need to
      # be web-served. data.json / blurbs.json are committed so GitHub Pages can
      # serve them to the app.
      - name: Restore alert state
        uses: actions/cache@v4
        with:
          path: seen.json
          key: vinyl-state-${{ github.run_id }}
          restore-keys: vinyl-state-

      - run: pip install -r requirements.txt

      - name: Run monitor
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          SMTP_HOST:           ${{ secrets.SMTP_HOST }}
          SMTP_PORT:           ${{ secrets.SMTP_PORT }}
          SMTP_USER:           ${{ secrets.SMTP_USER }}
          SMTP_PASS:           ${{ secrets.SMTP_PASS }}
          EMAIL_TO:            ${{ secrets.EMAIL_TO }}
        run: python monitor.py

       - name: Commit published data
        run: |
          git config user.name  "vinyl-monitor[bot]"
          git config user.email "actions@github.com"
          git add data.json blurbs.json 2>/dev/null || true
          git add -A
          git diff --staged --quiet && exit 0
          git commit -m "Update catalog data [skip ci]"
          git pull --rebase origin main
          git push
