name: Jazz Vinyl Monitor

on:
  schedule:
    # Runs daily at 08:00 UTC (10:00 Brussels in summer). Adjust as you like.
    # Cron is in UTC. Format: minute hour day month weekday.
    - cron: "0 8 * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write   # needed so the job can commit seen.json back

concurrency:
  group: vinyl-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Run monitor
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          SMTP_HOST:           ${{ secrets.SMTP_HOST }}
          SMTP_PORT:           ${{ secrets.SMTP_PORT }}
          SMTP_USER:           ${{ secrets.SMTP_USER }}
          SMTP_PASS:           ${{ secrets.SMTP_PASS }}
          EMAIL_TO:            ${{ secrets.EMAIL_TO }}
        run: python monitor.py

      - name: Commit updated state
        run: |
          git config user.name  "vinyl-monitor[bot]"
          git config user.email "actions@github.com"
          git add seen.json
          git diff --staged --quiet && exit 0
          git commit -m "Update seen state [skip ci]"
          git pull --rebase origin main
          git push
